<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع المبرمج أحمد</title>
    
    <!-- هنا أضفنا التنسيقات والألوان (CSS) -->
    <style>
        body {
            background-color: #1a1a1a; /* لون الخلفية أسود مائل للرمادي */
            color: #ffffff;            /* لون النص أبيض */
            font-family: Arial, sans-serif; /* نوع الخط */
            text-align: center;        /* جعل كل النصوص في منتصف الصفحة */
            padding: 50px 20px;        /* مسافات داخلية لترتيب العناصر */
        }
        h1 {
            color: #4caf50;            /* لون العنوان الرئيسي أخضر مميز */
        }
        .my-photo {
            width: 150px;              /* عرض الصورة */
            height: 150px;             /* طول الصورة */
            border-radius: 50%;        /* جعل الصورة دائرية احترافية */
            border: 3px solid #4caf50; /* إطار أخضر حول الصورة */
            margin-bottom: 20px;       /* مسافة أسفل الصورة */
        }
    </style>
</head>
<body>

    <!-- 1. مكان الصورة الشخصية -->
    <!-- استبدل "my-image.jpg" باسم ملف صورتك الحقيقي لاحقاً -->
    <img src="my-image.jpg" alt="صورة المبرمج أحمد" class="my-photo">

    <!-- 2. العنوان الرئيسي -->
    <h1>المبرمج أحمد عمر الغزالي</h1>
    
    <!-- 3. النصوص والفقرات -->
    <p>هذا أول مشروع لي، هل تعتقدون بأنني سأنجح؟</p>
    <p>شكراً لكل من يتمنى لي التوفيق.</p>

</body>
